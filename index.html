<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex Eats — Therapeutic Release</title>
    
    <meta name="title" content="Ex Eats — Therapeutic Release">
    <meta name="description" content="A gentle, therapeutic game to help you process and release. Watch your ex chase your past - a playful way to let go.">
    <meta name="theme-color" content="#A8C9A5">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="breathing-bg"></div>
    <div class="grain-overlay"></div>
    
    <main class="zen-container">
        <header class="zen-header">
            <div class="header-content">
                <h1 class="title">
                    <span class="title-word word-1">Release</span>
                    <span class="title-word word-2">&amp;</span>
                    <span class="title-word word-3">Restore</span>
                </h1>
                <p class="subtitle">A gentle space to let go</p>
            </div>
            <div class="breathing-indicator">
                <span class="breath-text">breathe</span>
                <div class="breath-ring"></div>
            </div>
        </header>

        <section class="game-stage">
            <div class="stage-glow"></div>
            <canvas id="game-canvas" width="560" height="420"></canvas>
            <div class="stage-frame"></div>
        </section>

        <section class="controls-panel">
            <div class="score-display">
                <div class="score-card">
                    <span class="score-label">Released</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-card highlight">
                    <span class="score-label">Best Release</span>
                    <span class="score-value" id="high-score">0</span>
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Your Ex</label>
                <div class="gender-selector" id="gender-selector">
                    <button class="gender-btn active" data-gender="ex-boyfriend">
                        <span class="gender-icon">👤</span>
                        <span>Boyfriend</span>
                    </button>
                    <button class="gender-btn" data-gender="ex-girlfriend">
                        <span class="gender-icon">👤</span>
                        <span>Girlfriend</span>
                    </button>
                    <button class="gender-btn" data-gender="neutral">
                        <span class="gender-icon">👥</span>
                        <span>Anyone</span>
                    </button>
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Release Intensity</label>
                <div class="toxicity-control">
                    <input type="range" id="toxicity-slider" min="1" max="3" value="2" class="zen-slider">
                    <div class="toxicity-labels">
                        <span data-level="1">Gentle</span>
                        <span data-level="2" class="active">Medium</span>
                        <span data-level="3">Intense</span>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="zen-btn primary" id="reset-btn">
                    <span class="btn-icon">↻</span>
                    <span>New Release</span>
                </button>
                <button class="zen-btn secondary" id="speed-btn">
                    <span class="btn-icon">⚡</span>
                    <span>Speed: Steady</span>
                </button>
            </div>
        </section>

        <section class="affirmation-banner">
            <div class="affirmation-content">
                <span class="affirmation-quote">"</span>
                <p class="affirmation-text" id="affirmation">You deserve peace. This is your space to release.</p>
                <span class="affirmation-quote">"</span>
            </div>
        </section>

        <section class="theme-picker">
            <span class="theme-label">Mood</span>
            <div class="theme-options">
                <button class="theme-btn active" data-theme="sage" title="Sage Serenity">
                    <span class="theme-dot sage"></span>
                </button>
                <button class="theme-btn" data-theme="peach" title="Peach Calm">
                    <span class="theme-dot peach"></span>
                </button>
                <button class="theme-btn" data-theme="lavender" title="Lavender Peace">
                    <span class="theme-dot lavender"></span>
                </button>
                <button class="theme-btn" data-theme="ocean" title="Ocean Flow">
                    <span class="theme-dot ocean"></span>
                </button>
            </div>
        </section>

        <footer class="zen-footer">
            <a href="https://github.com/instax-dutta/SnakeAI" target="_blank" class="contribute-link">
                <span class="contribute-icon">◇</span>
                <span>Contribute</span>
            </a>
            <p class="footer-text">Made with healing energy</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
